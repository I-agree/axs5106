name: Build OpenWrt 25.12 (Linux 6.12) Kernel Module

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      PKG_NAME: axs5106
      # 直接锁定准确的 SDK 文件名 (GCC 14.3.0, Zstd 压缩格式)
      SDK_FILE: openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
      RELEASE_VER: "25.12.4"
      TARGET_DIR: "x86/64"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies (including zstd)
      run: |
        sudo apt-get update
        # 注意：这里必须安装 zstd，否则无法解压 .tar.zst 文件
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3 python3-setuptools rsync swig unzip zlib1g-dev \
        file wget libelf-dev curl zstd

    - name: Download OpenWrt 25.12 SDK
      run: |
        MIRROR_URL="https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/${RELEASE_VER}/targets/${TARGET_DIR}/${SDK_FILE}"
        OFFICIAL_URL="https://downloads.openwrt.org/releases/${RELEASE_VER}/targets/${TARGET_DIR}/${SDK_FILE}"
        
        echo "Attempting to download SDK from Tsinghua Mirror..."
        # 优先尝试清华镜像，如果失败 (exit code 非 0) 则回退到官方源
        wget -q --show-progress "$MIRROR_URL" -O sdk.tar.zst || wget -q --show-progress "$OFFICIAL_URL" -O sdk.tar.zst
        
        if [ ! -s sdk.tar.zst ]; then
          echo "::error::SDK download failed!"
          exit 1
        fi
        echo "SDK downloaded successfully."

    - name: Extract SDK
      run: |
        mkdir -p openwrt-sdk
        # 使用 tar 自动识别 zstd 格式进行解压
        tar --zstd -xf sdk.tar.zst --strip-components=1 -C openwrt-sdk
        echo "SDK extracted successfully."

    - name: Prepare package directory
      run: |
        mkdir -p openwrt-sdk/package/$PKG_NAME
        rsync -a --exclude='.git' --exclude='.github' ./ openwrt-sdk/package/$PKG_NAME/

    - name: Update feeds and configure
      working-directory: openwrt-sdk
      run: |
        # 替换 feeds 源为清华镜像，加速下载
        if [ -f feeds.conf.default ]; then
          sed -i 's|https://downloads.openwrt.org|https://mirrors.tuna.tsinghua.edu.cn/openwrt|g' feeds.conf.default
        fi
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        make defconfig
        
        # 强制开启我们的模块编译 (M 代表编译为 .ko 模块)
        echo "CONFIG_PACKAGE_kmod-$PKG_NAME=m" >> .config
        make defconfig

    - name: Compile kernel module (Linux 6.12)
      working-directory: openwrt-sdk
      run: |
        echo "Starting compilation against Linux 6.12 kernel headers..."
        make package/$PKG_NAME/compile V=s -j2

    - name: Check build result and collect artifacts
      working-directory: openwrt-sdk
      run: |
        echo "Searching for compiled kernel object..."
        KO_FILE=$(find build_dir/ -name "${PKG_NAME}.ko")
        if [ -z "$KO_FILE" ]; then
          echo "::error::Compilation failed! ${PKG_NAME}.ko not found."
          exit 1
        fi
        echo "✅ Success! Found kernel object: $KO_FILE"
        
        echo "Searching for package files (.apk or .ipk)..."
        find bin/ -name "kmod-${PKG_NAME}*.apk" -o -name "kmod-${PKG_NAME}*.ipk"

    - name: Upload compiled Package artifact
      uses: actions/upload-artifact@v4
      with:
        name: kmod-${{ env.PKG_NAME }}-openwrt-25.12
        path: |
          openwrt-sdk/bin/packages/*/base/kmod-${{ env.PKG_NAME }}*.apk
          openwrt-sdk/bin/packages/*/base/kmod-${{ env.PKG_NAME }}*.ipk
          openwrt-sdk/bin/targets/*/packages/kmod-${{ env.PKG_NAME }}*.apk
          openwrt-sdk/bin/targets/*/packages/kmod-${{ env.PKG_NAME }}*.ipk
        if-no-files-found: warn
