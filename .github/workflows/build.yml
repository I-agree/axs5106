name: Build OpenWrt Kernel Module

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    # 【修改1】固定为 Ubuntu 22.04，这是 OpenWrt 官方推荐的构建环境，避免 Python 3.12 和 GCC 14 的兼容性问题
    runs-on: ubuntu-22.04
    
    env:
      SDK_URL: https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz
      PKG_NAME: axs5106

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        # 【修改2】移除了 python3-distutils，补充了 python3 和 rsync
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3 python3-setuptools rsync swig unzip zlib1g-dev \
        file wget libelf-dev

    - name: Download and extract OpenWrt SDK
      run: |
        echo "Downloading OpenWrt SDK..."
        wget -q $SDK_URL -O sdk.tar.xz
        mkdir -p openwrt-sdk
        tar -xJf sdk.tar.xz --strip-components=1 -C openwrt-sdk
        echo "SDK extracted successfully."

    - name: Prepare package directory
      run: |
        mkdir -p openwrt-sdk/package/$PKG_NAME
        # 排除 .git 和 .github 目录，只复制源码和 Makefile
        rsync -a --exclude='.git' --exclude='.github' ./ openwrt-sdk/package/$PKG_NAME/

    - name: Update feeds and configure
      working-directory: openwrt-sdk
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        make defconfig
        
        # 强制开启我们的模块编译 (M 代表编译为 .ko 模块)
        echo "CONFIG_PACKAGE_kmod-$PKG_NAME=m" >> .config
        make defconfig

    - name: Compile kernel module
      working-directory: openwrt-sdk
      run: |
        echo "Starting compilation with verbose output..."
        make package/$PKG_NAME/compile V=s -j$(nproc)

    - name: Check build result and collect artifacts
      working-directory: openwrt-sdk
      run: |
        echo "Searching for compiled .ipk packages..."
        find bin/ -name "kmod-${PKG_NAME}*.ipk"
        
        KO_FILE=$(find build_dir/ -name "${PKG_NAME}.ko")
        if [ -z "$KO_FILE" ]; then
          echo "::error::Compilation failed! ${PKG_NAME}.ko not found."
          exit 1
        fi
        echo "Success! Found kernel object: $KO_FILE"

    - name: Upload compiled IPK artifact
      uses: actions/upload-artifact@v4
      with:
        name: kmod-${{ env.PKG_NAME }}-x86_64
        path: openwrt-sdk/bin/packages/*/base/kmod-${{ env.PKG_NAME }}*.ipk
        if-no-files-found: warn
