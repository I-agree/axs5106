name: Build OpenWrt 25.12 (Linux 6.12) Kernel Module

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      # 锁定 OpenWrt 25.12.4 (Linux 6.12) 稳定版目录
      RELEASE_VER: "25.12.4"
      TARGET_DIR: "x86/64"
      PKG_NAME: axs5106

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3 python3-setuptools rsync swig unzip zlib1g-dev \
        file wget libelf-dev curl

    - name: Fetch and Download OpenWrt 25.12 SDK
      run: |
        MIRROR_URL="https://mirrors.tuna.tsinghua.edu.cn/openwrt/releases/${RELEASE_VER}/targets/${TARGET_DIR}"
        OFFICIAL_URL="https://downloads.openwrt.org/releases/${RELEASE_VER}/targets/${TARGET_DIR}"
        
        echo "Fetching SDK filename from Tsinghua Mirror..."
        # 稳定版目录固定不变，用 curl 抓取页面提取 .tar.xz 文件名，100% 准确
        SDK_FILE=$(curl -s "${MIRROR_URL}/" | grep -o 'openwrt-sdk-.*\.Linux-x86_64\.tar\.xz' | head -n 1)
        
        if [ -z "$SDK_FILE" ]; then
          echo "Mirror timeout, fallback to official source..."
          SDK_FILE=$(curl -s "${OFFICIAL_URL}/" | grep -o 'openwrt-sdk-.*\.Linux-x86_64\.tar\.xz' | head -n 1)
          BASE_URL=$OFFICIAL_URL
        else
          BASE_URL=$MIRROR_URL
        fi

        if [ -z "$SDK_FILE" ]; then
          echo "::error::Failed to find SDK file in ${RELEASE_VER} directory!"
          exit 1
        fi
        
        FULL_URL="${BASE_URL}/${SDK_FILE}"
        echo "Found SDK: ${SDK_FILE}"
        echo "Downloading from: ${FULL_URL}"
        
        wget -q --show-progress "${FULL_URL}" -O sdk.tar.xz
        mkdir -p openwrt-sdk
        tar -xJf sdk.tar.xz --strip-components=1 -C openwrt-sdk
        echo "SDK extracted successfully."

    - name: Prepare package directory
      run: |
        mkdir -p openwrt-sdk/package/$PKG_NAME
        rsync -a --exclude='.git' --exclude='.github' ./ openwrt-sdk/package/$PKG_NAME/

    - name: Update feeds and configure
      working-directory: openwrt-sdk
      run: |
        # 替换 feeds 源为清华镜像，加速下载
        if [ -f feeds.conf.default ]; then
          sed -i 's|https://downloads.openwrt.org|https://mirrors.tuna.tsinghua.edu.cn/openwrt|g' feeds.conf.default
        fi
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        make defconfig
        
        # 强制开启我们的模块编译 (M 代表编译为 .ko 模块)
        echo "CONFIG_PACKAGE_kmod-$PKG_NAME=m" >> .config
        make defconfig

    - name: Compile kernel module
      working-directory: openwrt-sdk
      run: |
        echo "Starting compilation against Linux 6.12..."
        make package/$PKG_NAME/compile V=s -j2

    - name: Check build result and collect artifacts
      working-directory: openwrt-sdk
      run: |
        echo "Searching for compiled kernel object..."
        # 核心验证：只要 .ko 文件生成了，就说明 C 代码和 Makefile 在 Linux 6.12 下编译成功！
        KO_FILE=$(find build_dir/ -name "${PKG_NAME}.ko")
        if [ -z "$KO_FILE" ]; then
          echo "::error::Compilation failed! ${PKG_NAME}.ko not found."
          exit 1
        fi
        echo "✅ Success! Found kernel object: $KO_FILE"
        
        echo "Searching for package files (.apk or .ipk)..."
        find bin/ -name "kmod-${PKG_NAME}*.apk" -o -name "kmod-${PKG_NAME}*.ipk"

    - name: Upload compiled Package artifact
      uses: actions/upload-artifact@v4
      with:
        # 25.12 使用 apk，旧版使用 ipk，这里使用通配符同时兼容两者
        name: kmod-${{ env.PKG_NAME }}-openwrt-25.12
        path: |
          openwrt-sdk/bin/packages/*/base/kmod-${{ env.PKG_NAME }}*.apk
          openwrt-sdk/bin/packages/*/base/kmod-${{ env.PKG_NAME }}*.ipk
          openwrt-sdk/bin/targets/*/packages/kmod-${{ env.PKG_NAME }}*.apk
          openwrt-sdk/bin/targets/*/packages/kmod-${{ env.PKG_NAME }}*.ipk
        if-no-files-found: warn
