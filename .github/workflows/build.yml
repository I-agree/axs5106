name: Build OpenWrt 25.12 (Linux 6.12) Kernel Module

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    env:
      PKG_NAME: axs5106
      SDK_FILE: openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
      RELEASE_VER: "25.12.4"
      TARGET_DIR: "x86/64"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6.0.3
    - name: Optimize runner environment (Swap & /tmp)
      run: |
        # 🚨 【针对性物理解决 Swap 核心隐患】 🚨
        echo "⚙️ 正在物理重构编译机 Swap 交换分区技术栈..."
        sudo swapoff -a || true
        sudo dd if=/dev/zero of=/swapfile bs=1M count=5120
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        sudo sysctl vm.swappiness=10
        echo "✅ Swap 扩容至 5GB 且 swappiness=10 校准完毕！"
        
        echo "📊 扩容系统全局 /tmp 至 10G"
        sudo umount /tmp || true
        sudo mount -t tmpfs tmpfs /tmp -o size=10G,nr_inodes=0
        echo "✅ /tmp 扩容至 10GB 完成"
        
        echo "📊 检查当前磁盘与内存空间分布："
        df -h
        free -h

    - name: Install build dependencies (including zstd)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3 python3-setuptools rsync swig unzip zlib1g-dev \
        file wget libelf-dev curl zstd

    - name: Download OpenWrt 25.12 SDK
      run: |
        OFFICIAL_URL="https://downloads.openwrt.org/releases/${RELEASE_VER}/targets/${TARGET_DIR}/${SDK_FILE}"
        echo "Downloading SDK from official OpenWrt source..."
        wget -q --show-progress "$OFFICIAL_URL" -O sdk.tar.zst
        
        if [ ! -s sdk.tar.zst ]; then
          echo "::error::SDK download failed!"
          exit 1
        fi
        echo "SDK downloaded successfully."

    - name: Extract SDK
      run: |
        mkdir -p openwrt-sdk
        tar --zstd -xf sdk.tar.zst --strip-components=1 -C openwrt-sdk
        echo "SDK extracted successfully."

    - name: Prepare package directory
      run: |
        mkdir -p openwrt-sdk/package/$PKG_NAME
        # 🚨 关键修复：必须排除 openwrt-sdk 目录和 sdk.tar.zst，防止 rsync 无限递归死循环！
        rsync -a \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='openwrt-sdk' \
          --exclude='sdk.tar.zst' \
          --exclude='.gitignore' \
          ./ openwrt-sdk/package/$PKG_NAME/
          
        echo "Package files copied successfully."
        ls -la openwrt-sdk/package/$PKG_NAME/

    - name: Update feeds and configure
      working-directory: openwrt-sdk
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        make defconfig
        
        echo "CONFIG_PACKAGE_kmod-$PKG_NAME=m" >> .config
        make defconfig

    - name: Compile kernel module (Linux 6.12)
      working-directory: openwrt-sdk
      run: |
        echo "Starting compilation against Linux 6.12 kernel headers..."
        make package/$PKG_NAME/compile V=w -j$(nproc)

    - name: Check build result and collect artifacts
      working-directory: openwrt-sdk
      run: |
        echo "Searching for compiled kernel object..."
        KO_FILE=$(find build_dir/ -name "${PKG_NAME}.ko")
        if [ -z "$KO_FILE" ]; then
          echo "::error::Compilation failed! ${PKG_NAME}.ko not found."
          exit 1
        fi
        echo "✅ Success! Found kernel object: $KO_FILE"
        
        echo "Searching for package files (.apk or .ipk)..."
        find bin/ -name "kmod-${PKG_NAME}*.apk" -o -name "kmod-${PKG_NAME}*.ipk"

    - name: Upload compiled Package artifact
      uses: actions/upload-artifact@v7.0.1
      with:
        name: kmod-${{ env.PKG_NAME }}-openwrt-25.12
        path: |
          openwrt-sdk/bin/targets/**/kmod-axs5106*.apk
          openwrt-sdk/bin/targets/**/kmod-axs5106*.ipk
          openwrt-sdk/bin/packages/**/kmod-axs5106*.apk
          openwrt-sdk/bin/packages/**/kmod-axs5106*.ipk
        if-no-files-found: warn
